{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">

    <title>{% block title %}Корочки есть{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="header">
        <div class="container nav">
            <a href="{% url 'app:home' %}" class="logo">Корочки есть</a>

            <nav class="menu">
                {% if user.is_authenticated %}
                    <a href="{% url 'app:application_create' %}">Новая заявка</a>
                    <a href="{% url 'app:application_list' %}">Мои заявки</a>
                    <a href="{% url 'users:logout' %}">Выход</a>
                {%  else %}
                    <a href="{% url 'users:login' %}">Вход</a>
                    <a href="{% url 'users:register' %}">Регистрация</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
</body>
</html>
